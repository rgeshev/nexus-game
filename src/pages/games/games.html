<section class="games-page py-5">
  <div class="container">
    <div class="d-flex flex-wrap justify-content-between align-items-end gap-3 mb-5">
      <div>
        <span class="section-eyebrow mb-3 d-inline-flex"><span class="pulse-dot"></span> Game Archive</span>
        <h1 class="section-title h2 mb-0">My Games</h1>
      </div>
      <a href="/game/start" data-nav class="btn-cta btn-cta-sm">
        <i class="bi bi-plus-circle-fill"></i> New Game
      </a>
    </div>

    <div class="glass-panel p-4">
      <div class="text-center py-5" data-games-loading>
        <div class="spinner-border text-info" role="status"></div>
        <p class="text-muted-nx mt-3 mb-0">Loading your games…</p>
      </div>

      <div class="text-center py-5 d-none" data-games-empty>
        <i class="bi bi-joystick display-4 text-muted-nx"></i>
        <p class="text-muted-nx mt-3 mb-4">You haven't played any games yet.</p>
        <a href="/game/start" data-nav class="btn-cta btn-cta-sm">
          <i class="bi bi-play-fill"></i> Start Your First Game
        </a>
      </div>

      <div class="alert alert-danger d-none" data-games-error role="alert"></div>

      <div class="table-responsive d-none" data-games-table-wrap>
        <table class="table table-dark table-borderless align-middle mb-0 nx-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Achieved Level</th>
              <th>Prize</th>
              <th>Duration</th>
              <th>Status</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody data-games-rows></tbody>
        </table>
      </div>
    </div>
  </div>
</section>

<div class="modal fade" id="deleteGameModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content nx-modal-content">
      <div class="modal-header border-0">
        <h2 class="modal-title h5 mb-0"><i class="bi bi-exclamation-triangle-fill text-gradient me-2"></i>Delete Game?</h2>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted-nx mb-0">
          This will permanently erase this run from the grid. This action cannot be undone.
        </p>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn-nx-outline" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn-cta btn-cta-sm" data-confirm-delete>
          <i class="bi bi-trash3-fill"></i> Delete Game
        </button>
      </div>
    </div>
  </div>
</div>
