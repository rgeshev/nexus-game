<section class="login-page">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-5">
        <div class="text-center mb-4">
          <span class="section-eyebrow"><span class="pulse-dot"></span> Secure Channel</span>
        </div>

        <div class="glass-panel-strong login-card">
          <div class="text-center mb-4">
            <div class="login-icon mx-auto"><i class="bi bi-shield-lock-fill"></i></div>
            <h1 class="h3 mt-3 mb-1">Access Terminal</h1>
            <p class="text-muted-nx mb-0">Authenticate to enter the grid</p>
          </div>

          <form class="login-form">
            <div class="mb-3">
              <label class="nx-form-label mb-2" for="login-email">Email</label>
              <input type="email" class="form-control nx-input" id="login-email" placeholder="you@nexus.io" />
            </div>
            <div class="mb-4">
              <label class="nx-form-label mb-2" for="login-password">Password</label>
              <input type="password" class="form-control nx-input" id="login-password" placeholder="••••••••" />
            </div>

            <button type="submit" class="btn-cta w-100 justify-content-center">
              <i class="bi bi-box-arrow-in-right"></i> Enter the Grid
            </button>
          </form>

          <div class="text-center mt-4">
            <a href="#" class="footer-link small">Forgot access code?</a>
          </div>
        </div>

        <p class="text-center text-muted-nx small mt-4">
          New to the broadcast? <a href="#" class="text-gradient text-decoration-none fw-semibold">Create an account</a>
        </p>
      </div>
    </div>
  </div>
</section>
