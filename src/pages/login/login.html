<section class="login-page">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-5">
        <div class="text-center mb-4">
          <span class="section-eyebrow"><span class="pulse-dot"></span> Secure Channel</span>
        </div>

        <div class="glass-panel-strong login-card">
          <div class="text-center mb-4">
            <div class="login-icon mx-auto"><i class="bi bi-shield-lock-fill"></i></div>
            <h1 class="h3 mt-3 mb-1">Access Terminal</h1>
            <p class="text-muted-nx mb-0" data-auth-subtitle>Authenticate to enter the grid</p>
          </div>

          <ul class="nav nav-pills auth-tabs justify-content-center mb-4" role="tablist">
            <li class="nav-item" role="presentation">
              <button
                type="button"
                class="nav-link active"
                data-auth-tab="login"
                role="tab"
                aria-selected="true"
              >
                Login
              </button>
            </li>
            <li class="nav-item" role="presentation">
              <button
                type="button"
                class="nav-link"
                data-auth-tab="register"
                role="tab"
                aria-selected="false"
              >
                Register
              </button>
            </li>
          </ul>

          <div class="auth-alert alert d-none" role="alert" data-auth-alert></div>

          <form class="auth-form" data-auth-form="login" novalidate>
            <div class="mb-3">
              <label class="nx-form-label mb-2" for="auth-email">Email</label>
              <input
                type="email"
                class="form-control nx-input"
                id="auth-email"
                name="email"
                placeholder="you@nexus.io"
                autocomplete="email"
                required
              />
            </div>
            <div class="mb-4">
              <label class="nx-form-label mb-2" for="auth-password">Password</label>
              <input
                type="password"
                class="form-control nx-input"
                id="auth-password"
                name="password"
                placeholder="••••••••"
                autocomplete="current-password"
                minlength="6"
                required
              />
            </div>
            <button type="submit" class="btn-cta w-100 justify-content-center" data-auth-submit>
              <i class="bi bi-box-arrow-in-right"></i> Enter the Grid
            </button>
          </form>

          <form class="auth-form d-none" data-auth-form="register" novalidate>
            <div class="mb-3">
              <label class="nx-form-label mb-2" for="register-email">Email</label>
              <input
                type="email"
                class="form-control nx-input"
                id="register-email"
                name="email"
                placeholder="you@nexus.io"
                autocomplete="email"
                required
              />
            </div>
            <div class="mb-3">
              <label class="nx-form-label mb-2" for="register-password">Password</label>
              <input
                type="password"
                class="form-control nx-input"
                id="register-password"
                name="password"
                placeholder="••••••••"
                autocomplete="new-password"
                minlength="6"
                required
              />
            </div>
            <div class="mb-4">
              <label class="nx-form-label mb-2" for="register-password-confirm">Confirm Password</label>
              <input
                type="password"
                class="form-control nx-input"
                id="register-password-confirm"
                name="passwordConfirm"
                placeholder="••••••••"
                autocomplete="new-password"
                minlength="6"
                required
              />
            </div>
            <button type="submit" class="btn-cta w-100 justify-content-center" data-auth-submit>
              <i class="bi bi-person-plus-fill"></i> Create Account
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
