<section class="game-page py-5">
  <div class="container">
    <div class="text-center py-5" data-game-loading>
      <div class="spinner-border text-info" role="status"></div>
      <p class="text-muted-nx mt-3 mb-0">Loading game…</p>
    </div>

    <div class="alert alert-danger d-none" data-game-error role="alert"></div>

    <div class="d-none" data-game-content>
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <span class="section-eyebrow">
          <span class="pulse-dot"></span> <span data-game-status-label>On Air</span>
        </span>
        <div class="d-flex align-items-center gap-3">
          <div class="lifelines d-none" data-lifelines>
            <button type="button" class="lifeline-btn" title="50/50" disabled><i class="bi bi-scissors"></i></button>
            <button type="button" class="lifeline-btn" title="Ask the Grid" disabled><i class="bi bi-people-fill"></i></button>
          </div>
          <a href="/games" data-nav class="btn-nx-outline btn-cta-sm">
            <i class="bi bi-arrow-left"></i> My Games
          </a>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-lg-8">
          <div class="glass-panel-strong question-panel p-4 p-md-5 mb-4 d-none" data-question-panel></div>
          <div class="row g-3 mb-4" data-answers-grid></div>
          <div class="glass-panel-strong p-4 p-md-5 d-none" data-result-panel></div>
        </div>

        <div class="col-lg-4">
          <div class="glass-panel p-4">
            <h2 class="h6 text-muted-nx mb-3"><i class="bi bi-trophy text-gradient me-2"></i>Prize Ladder</h2>
            <div class="prize-ladder prize-ladder-compact" data-prize-ladder></div>

            <button type="button" class="btn-nx-outline w-100 justify-content-center mt-4 d-none" data-cash-out>
              <i class="bi bi-cash-coin"></i> Cash Out Now
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
