<section class="game-page py-5">
  <div class="container">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
      <span class="section-eyebrow"><span class="pulse-dot"></span> Game <span data-game-id></span> · On Air</span>
      <div class="lifelines">
        <button type="button" class="lifeline-btn" title="50/50"><i class="bi bi-scissors"></i></button>
        <button type="button" class="lifeline-btn" title="Ask the Grid"><i class="bi bi-people-fill"></i></button>
        <button type="button" class="lifeline-btn" title="Skip Question"><i class="bi bi-skip-forward-fill"></i></button>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-lg-8">
        <div class="glass-panel-strong question-panel p-4 p-md-5 mb-4">
          <span class="question-points">Question 8 · Worth $2,500</span>
          <h1 class="h3 question-text mt-3 mb-0">
            Which planet is closest to the Sun in our solar system?
          </h1>
        </div>

        <div class="row g-3">
          <div class="col-md-6">
            <button type="button" class="answer-option">
              <span class="answer-letter">A</span>
              <span class="answer-value">Venus</span>
            </button>
          </div>
          <div class="col-md-6">
            <button type="button" class="answer-option">
              <span class="answer-letter">B</span>
              <span class="answer-value">Mercury</span>
            </button>
          </div>
          <div class="col-md-6">
            <button type="button" class="answer-option">
              <span class="answer-letter">C</span>
              <span class="answer-value">Earth</span>
            </button>
          </div>
          <div class="col-md-6">
            <button type="button" class="answer-option">
              <span class="answer-letter">D</span>
              <span class="answer-value">Mars</span>
            </button>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="glass-panel p-4">
          <h2 class="h6 text-muted-nx mb-3"><i class="bi bi-trophy text-gradient me-2"></i>Prize Ladder</h2>
          <div class="prize-ladder prize-ladder-compact">
            <div class="ladder-rung ladder-rung-gold">
              <span class="ladder-rank">05</span>
              <span class="ladder-name">Mastermind</span>
              <span class="ladder-prize">$50,000</span>
            </div>
            <div class="ladder-rung ladder-rung-current">
              <span class="ladder-rank">04</span>
              <span class="ladder-name">Expert Zone</span>
              <span class="ladder-prize">$10,000</span>
            </div>
            <div class="ladder-rung">
              <span class="ladder-rank">03</span>
              <span class="ladder-name">Challenger</span>
              <span class="ladder-prize">$2,500</span>
            </div>
            <div class="ladder-rung">
              <span class="ladder-rank">02</span>
              <span class="ladder-name">Easy Street</span>
              <span class="ladder-prize">$500</span>
            </div>
            <div class="ladder-rung">
              <span class="ladder-rank">01</span>
              <span class="ladder-name">Warm Up</span>
              <span class="ladder-prize">$100</span>
            </div>
          </div>

          <button type="button" class="btn-nx-outline w-100 justify-content-center mt-4">
            <i class="bi bi-cash-coin"></i> Cash Out Now
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
